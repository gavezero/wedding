<meta name="theme-color" content="#ffffff">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💙</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --paper:#ffffff;
  --bg:#edf3f8;
  --ink:#3b4854;
  --body:#4e5d69;
  --sub:#7d93a5;
  --faint:#a9bfd0;
  --accent:#5da3d6;
  --accent-deep:#3f88bf;
  --hair:#e0eaf2;
  --soft:#f5f9fc;
  --sun:#d99090;
  --sat:#82a8cc;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;touch-action:manipulation}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Gowun Batang','Noto Sans KR',serif;
  font-size:15px;
  line-height:1.8;
  -webkit-font-smoothing:antialiased;
  word-break:keep-all;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
img{
  display:block;max-width:100%;
  -webkit-user-drag:none;
  -webkit-touch-callout:none;
  -webkit-user-select:none;user-select:none;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none;-webkit-tap-highlight-color:transparent}
::selection{background:#dcebf7}

#wrap{
  position:relative;
  max-width:430px;
  margin:0 auto;
  background:var(--paper);
  box-shadow:0 0 60px rgba(60,90,115,.09);
  overflow:hidden;
}

/* ── 공통 섹션 ───────────────────────── */
.sec{padding:86px 30px;text-align:center}
.sec.alt{background:var(--soft)}
.sec-head{margin-bottom:44px}
.sec-bar{width:1px;height:34px;margin:0 auto 20px;background:var(--accent);opacity:.55}
.sec-label{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;font-weight:500;
  letter-spacing:.5em;padding-left:.5em;
  color:var(--accent);text-transform:uppercase;
}
.sec-title{margin-top:12px;font-size:21px;font-weight:700;letter-spacing:.06em}

.fade{opacity:0;transform:translateY(26px);transition:opacity .9s ease,transform .9s ease}
.fade.show{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){
  .fade{transition:none;opacity:1;transform:none}
}

/* ── 표지 ───────────────────────────── */
.cover{padding:92px 30px 76px;text-align:center}
.cv-top{
  font-family:'Cormorant Garamond',serif;
  font-size:12px;letter-spacing:.55em;padding-left:.55em;
  color:var(--faint);text-transform:uppercase;
}
.cv-year{
  margin-top:38px;
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-weight:400;
  letter-spacing:.5em;padding-left:.5em;color:var(--sub);
}
.cv-date{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;font-size:56px;letter-spacing:.06em;line-height:1.2;
}
.cv-date em{font-style:normal;font-size:.68em;color:#c6d8e8;padding:0 10px}
.cv-week{
  font-family:'Cormorant Garamond',serif;
  font-size:12.5px;font-weight:500;
  letter-spacing:.4em;padding-left:.4em;
  color:var(--sub);text-transform:uppercase;
}
.cv-photo{
  width:min(76%,290px);aspect-ratio:3/4;
  margin:48px auto 42px;
  border-radius:155px 155px 10px 10px;
  overflow:hidden;
  box-shadow:0 18px 40px -18px rgba(60,95,125,.32);
  background:var(--soft);
}
.cv-photo img{width:100%;height:100%;object-fit:cover}
.cv-names{font-size:22px;letter-spacing:.12em}
.cv-names i{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-weight:400;font-size:17px;
  color:var(--accent);margin:0 12px;letter-spacing:.04em;
}
.cv-info{margin-top:26px;font-size:14.5px;color:var(--sub);line-height:1.95}

/* ── 사진 자리표시 (이미지 없을 때) ───── */
.ph{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(160deg,#f2f8fc,#e2edf6);
  color:var(--faint);
}
.ph svg{width:26px;height:26px;stroke:var(--faint);fill:none}
.ph span{font-family:'Noto Sans KR',sans-serif;font-size:11px;letter-spacing:.04em;line-height:1.7;text-align:center}
.ph b{display:block;font-weight:500;color:var(--sub)}

/* ── 초대글 ─────────────────────────── */
.greet{white-space:pre-line;font-size:15.5px;line-height:2.15;color:var(--body)}
.family{
  margin-top:54px;padding-top:46px;border-top:1px solid var(--hair);
  display:flex;flex-direction:column;gap:15px;font-size:15.5px;
}
.family .rel{color:var(--sub);font-size:13.5px;margin:0 8px 0 5px}
.family b{font-weight:700;letter-spacing:.05em}
.btn-line{margin-top:46px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 26px;border:1px solid var(--hair);border-radius:999px;
  font-family:'Noto Sans KR',sans-serif;font-size:13.5px;color:#4f6373;
  background:#fff;transition:transform .2s,background .2s;
}
.btn:active{transform:scale(.97);background:var(--soft)}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none}

/* ── 예식 일시 (달력·카운트다운) ──────── */
.cal{
  max-width:292px;margin:0 auto;
  padding:32px 8px 28px;
  border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);
}
.cal-month{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;font-weight:300;
  letter-spacing:.3em;padding-left:.3em;
  margin-bottom:24px;text-transform:uppercase;
}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);row-gap:13px;
  font-family:'Noto Sans KR',sans-serif;font-size:13.5px;font-weight:300;
}
.cal-grid .dow{font-size:11px;letter-spacing:.1em;color:var(--faint);font-weight:400;margin-bottom:2px}
.cal-grid .sun{color:var(--sun)}
.cal-grid .sat{color:var(--sat)}
.cal-grid .day{position:relative;height:34px;line-height:34px}
.cal-grid .wd span{position:relative;z-index:1;color:#fff;font-weight:500}
.cal-grid .wd::before{
  content:'';position:absolute;left:50%;top:50%;
  width:34px;height:34px;transform:translate(-50%,-50%);
  background:var(--accent-deep);border-radius:50%;
}
.cd-wrap{margin-top:42px;display:flex;justify-content:center;gap:10px}
.cd{width:62px;padding:13px 0 11px;background:#fff;border:1px solid var(--hair);border-radius:12px}
.sec.alt .cd{background:#fff}
.cd b{display:block;font-family:'Cormorant Garamond',serif;font-weight:400;font-size:25px;line-height:1.2}
.cd span{font-family:'Noto Sans KR',sans-serif;font-size:9.5px;letter-spacing:.18em;color:var(--faint)}
.dday{margin-top:28px;font-size:14.5px;color:var(--sub)}
.dday b{color:var(--accent-deep);font-weight:700}
.dday .hrt{color:var(--accent);font-size:12px;padding:0 2px}

/* ── 갤러리 ─────────────────────────── */
.g-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.g-item{aspect-ratio:1;border-radius:6px;overflow:hidden;background:var(--soft);padding:0}
.g-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;pointer-events:none}
.g-item:active img{transform:scale(1.06)}
.g-item .ph svg{width:20px;height:20px}
.g-item .ph span{font-size:9.5px;line-height:1.5}

/* ── 라이트박스 ──────────────────────── */
.lb{
  position:fixed;inset:0;z-index:60;
  background:rgba(14,22,30,.95);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
  touch-action:none;
}
.lb.open{opacity:1;pointer-events:auto}
.lb img{max-width:92vw;max-height:76vh;object-fit:contain;border-radius:4px}
.lb-cnt{
  position:absolute;top:24px;left:50%;transform:translateX(-50%);
  color:#c3d2de;font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.25em;
}
.lb-x{position:absolute;top:12px;right:12px;width:48px;height:48px;color:#e4edf4;font-size:28px;font-weight:300;line-height:1}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:48px;height:70px;color:#ccdae6;
  font-size:36px;font-weight:300;font-family:serif;line-height:1;
}
.lb-prev{left:2px}
.lb-next{right:2px}

/* ── 오시는 길 ───────────────────────── */
.loc-venue{font-size:18px;font-weight:700;letter-spacing:.05em}
.loc-hall{margin-top:6px;font-size:14px;color:var(--sub)}
.loc-addr{
  margin-top:20px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
  font-family:'Noto Sans KR',sans-serif;font-size:13.5px;font-weight:300;color:var(--sub);
}
.chip{
  padding:7px 13px;border:1px solid var(--hair);border-radius:8px;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#4f6373;background:#fff;
  transition:background .2s;white-space:nowrap;
}
.chip:active{background:var(--soft)}
.loc-tel{margin-top:12px;font-family:'Noto Sans KR',sans-serif;font-size:12.5px;font-weight:300;color:var(--faint)}
.loc-tel a{border-bottom:1px solid var(--hair);padding-bottom:1px}
.map-box{
  margin:30px 0 14px;height:230px;
  border:1px solid var(--hair);border-radius:14px;
  overflow:hidden;position:relative;background:var(--soft);
}
.map-box::before{
  content:'지도가 표시되는 영역입니다';
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--faint);font-family:'Noto Sans KR',sans-serif;font-size:12px;
}
.map-box iframe{position:relative;z-index:1;width:100%;height:100%;border:0}
.map-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.map-btns a{
  padding:12px 0;border:1px solid var(--hair);border-radius:10px;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#4f6373;background:#fff;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:background .2s;
}
.map-btns a:active{background:var(--soft)}
.dot{width:7px;height:7px;border-radius:50%;flex:none}
.transit{margin-top:46px;text-align:left}
.tr{padding:20px 2px;border-top:1px solid var(--hair)}
.tr:last-child{border-bottom:1px solid var(--hair)}
.tr b{display:block;font-size:14.5px;letter-spacing:.08em;margin-bottom:6px}
.tr b::before{
  content:'';display:inline-block;width:14px;height:1px;
  background:var(--accent);vertical-align:middle;margin-right:9px;opacity:.7;
}
.tr p{white-space:pre-line;font-family:'Noto Sans KR',sans-serif;font-weight:300;font-size:13.5px;color:var(--sub);line-height:1.9}

/* ── 마음 전하실 곳 ──────────────────── */
.acc-guide{font-size:14px;color:var(--sub);line-height:2.05;margin-bottom:36px}
.acc{border:1px solid var(--hair);border-radius:14px;background:#fff;overflow:hidden;text-align:left}
.acc + .acc{margin-top:14px}
.acc-h{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;font-size:14.5px;letter-spacing:.06em;
}
.acc-h svg{width:14px;height:14px;stroke:var(--faint);fill:none;transition:transform .3s;flex:none}
.acc.open .acc-h svg{transform:rotate(180deg)}
.acc-b{max-height:0;overflow:hidden;transition:max-height .4s ease}
.acc.open .acc-b{max-height:460px}
.ac-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 20px;border-top:1px solid var(--hair);
}
.ac-row .who{font-family:'Noto Sans KR',sans-serif;font-weight:400;font-size:13.5px;line-height:1.65;min-width:0}
.ac-row .who b{font-weight:500}
.ac-row .who span{display:block;font-size:12px;font-weight:300;color:var(--faint)}

/* ── 맺음 ───────────────────────────── */
.close-photo{border-radius:16px;overflow:hidden;aspect-ratio:4/3;margin-bottom:42px;background:var(--soft)}
.close-photo img{width:100%;height:100%;object-fit:cover}
.close-msg{white-space:pre-line;font-size:15.5px;line-height:2.1;color:var(--body)}
.rsvp{margin-top:42px}

/* ── 푸터 ───────────────────────────── */
footer{padding:56px 30px 66px;text-align:center;background:var(--soft);border-top:1px solid var(--hair)}
.share-btns{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.foot-names{
  margin-top:38px;font-size:12.5px;letter-spacing:.28em;padding-left:.28em;
  color:var(--faint);
}
.foot-names .hrt{color:var(--accent);opacity:.7;padding:0 4px}

/* ── 연락하기 바텀시트 ────────────────── */
.dim{
  position:fixed;inset:0;z-index:50;background:rgba(18,32,44,.45);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.dim.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:50%;bottom:0;z-index:55;
  transform:translate(-50%,105%);
  width:100%;max-width:430px;
  background:#fff;border-radius:22px 22px 0 0;
  padding:30px 26px calc(26px + env(safe-area-inset-bottom));
  transition:transform .35s ease;
}
.sheet.open{transform:translate(-50%,0)}
.sheet-title{text-align:center;font-size:16px;letter-spacing:.2em;padding-left:.2em}
.cg{margin-top:24px}
.cg-t{font-family:'Noto Sans KR',sans-serif;font-size:11.5px;font-weight:400;letter-spacing:.28em;color:var(--accent);margin-bottom:4px}
.c-row{display:flex;align-items:center;justify-content:space-between;padding:13px 2px;border-bottom:1px solid var(--hair)}
.c-row .nm{font-size:15px}
.c-row .nm span{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:300;color:var(--faint);margin-right:10px}
.c-phone{
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:300;
  color:var(--sub);white-space:nowrap;letter-spacing:.02em;
}
.sheet-close{
  margin-top:26px;width:100%;padding:14px;border-radius:12px;
  background:var(--soft);font-family:'Noto Sans KR',sans-serif;font-size:14px;color:#4f6373;
}

/* ── 토스트 ─────────────────────────── */
.toast{
  position:fixed;left:50%;bottom:36px;z-index:70;
  transform:translate(-50%,14px);
  background:rgba(34,48,60,.92);color:#eef5fa;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;
  padding:11px 22px;border-radius:999px;
  opacity:0;pointer-events:none;transition:opacity .35s,transform .35s;
}
.toast.on{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<div id="wrap">

  <!-- ════ 표지 ════ -->
  <section class="cover">
    <p class="cv-top fade">Wedding Invitation</p>
    <p class="cv-year fade" id="cvYear"></p>
    <h1 class="cv-date fade"><span id="cvM"></span><em>/</em><span id="cvD"></span></h1>
    <p class="cv-week fade" id="cvWeek"></p>
    <div class="cv-photo fade"><img id="mainPhoto" src="images/main.jpg" alt="신랑 신부 사진"></div>
    <p class="cv-names fade"><span id="cvGroom"></span><i>and</i><span id="cvBride"></span></p>
    <p class="cv-info fade"><span id="cvDateKo"></span><br><span id="cvVenue"></span></p>
  </section>

  <!-- ════ 초대글 ════ -->
  <section class="sec">
    <div class="sec-head fade">
      <div class="sec-bar"></div>
      <p class="sec-label">Invitation</p>
      <h2 class="sec-title">소중한 분들을 초대합니다</h2>
    </div>
    <p class="greet fade" id="greeting"></p>
    <div class="family fade" id="family"></div>
    <div class="btn-line fade">
      <button class="btn" id="btnContact" type="button">
        <svg viewBox="0 0 24 24" stroke-width="1.6"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.9a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c.9.3 1.9.6 2.9.7a2 2 0 0 1 1.7 2z"/></svg>
        축하 연락하기
      </button>
    </div>
  </section>

  <!-- ════ 예식 일시 ════ -->
  <section class="sec alt">
    <div class="sec-head fade">
      <div class="sec-bar"></div>
      <p class="sec-label">Wedding Day</p>
      <h2 class="sec-title" id="calKoDate"></h2>
    </div>
    <div class="cal fade">
      <p class="cal-month" id="calMonth"></p>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="cd-wrap fade">
      <div class="cd"><b id="cdD">0</b><span>DAYS</span></div>
      <div class="cd"><b id="cdH">0</b><span>HOUR</span></div>
      <div class="cd"><b id="cdM">0</b><span>MIN</span></div>
      <div class="cd"><b id="cdS">0</b><span>SEC</span></div>
    </div>
    <p class="dday fade" id="ddayLine"></p>
  </section>

  <!-- ════ 갤러리 ════ -->
  <section class="sec">
    <div class="sec-head fade">
      <div class="sec-bar"></div>
      <p class="sec-label">Gallery</p>
      <h2 class="sec-title">우리의 순간들</h2>
    </div>
    <div class="g-grid fade" id="gGrid"></div>
  </section>

  <!-- ════ 오시는 길 ════ -->
  <section class="sec alt">
    <div class="sec-head fade">
      <div class="sec-bar"></div>
      <p class="sec-label">Location</p>
      <h2 class="sec-title">오시는 길</h2>
    </div>
    <p class="loc-venue fade" id="locName"></p>
    <p class="loc-hall fade" id="locHall"></p>
    <div class="loc-addr fade">
      <span id="locAddr"></span>
      <button class="chip" id="btnAddr" type="button">주소 복사</button>
    </div>
    <p class="loc-tel fade" id="locTel"></p>
    <div class="map-box fade"><iframe id="mapFrame" loading="lazy" title="오시는 길 지도" referrerpolicy="no-referrer-when-downgrade"></iframe></div>
    <div class="map-btns fade">
      <a id="lnkNaver" target="_blank" rel="noopener"><span class="dot" style="background:#2db400"></span>네이버지도</a>
      <a id="lnkKakao" target="_blank" rel="noopener"><span class="dot" style="background:#f2cf3f"></span>카카오맵</a>
      <a id="lnkTmap"><span class="dot" style="background:#3d6df2"></span>티맵</a>
    </div>
    <div class="transit fade" id="transit"></div>
  </section>

  <!-- ════ 마음 전하실 곳 ════ -->
  <section class="sec">
    <div class="sec-head fade">
      <div class="sec-bar"></div>
      <p class="sec-label">With Gratitude</p>

감사의 마음을 전합니다.`,

/* ═══════════════════════════════ 수정 끝 ═══════════════════════════════ */


/* ---------- 공통 도우미 ---------- */
const $ = id => document.getElementById(id);
const D = new Date(CONFIG.wedding.date);
const p2 = n => String(n).padStart(2, '0');
const lock = on => { document.body.style.overflow = on ? 'hidden' : ''; };

let toastTimer;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg || '복사되었습니다';
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 1800);
}

async function copyText(text, msg) {
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e2) {}
    ta.remove();
  }
  toast(msg);
}

/* 이미지가 없을 때 예쁜 자리표시로 바꿔주기 */
function phNode(label) {
  const d = document.createElement('div');
  d.className = 'ph';
  d.innerHTML =
    '<svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="3"/>' +
    '<circle cx="8.5" cy="9" r="1.7"/><path d="M21 15.5l-4.5-4.5L6 21.5"/></svg>' +
    '<span><b></b>사진을 넣어주세요</span>';
  d.querySelector('b').textContent = label;
  return d;
}
function initImg(img, label) {
  const swap = () => img.parentNode.replaceChild(phNode(label), img);
  if (img.complete) { if (!img.naturalWidth) swap(); }
  else img.addEventListener('error', swap);
}

/* ---------- 표지 ---------- */
(function cover() {
  const WEEK = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const h = D.getHours(), ap = h < 12 ? 'AM' : 'PM', h12 = h % 12 || 12;

  $('cvM').textContent = p2(D.getMonth() + 1);
  $('cvD').textContent = p2(D.getDate());
  $('cvWeek').textContent = WEEK[D.getDay()] + ' · ' + h12 + ':' + p2(D.getMinutes()) + ' ' + ap;
  $('cvGroom').textContent = CONFIG.groom.name;
  $('cvBride').textContent = CONFIG.bride.name;
  $('cvDateKo').textContent = CONFIG.wedding.dateText;
  $('cvVenue').textContent = CONFIG.venue.name + (CONFIG.venue.hall ? ' · ' + CONFIG.venue.hall : '');
  initImg($('mainPhoto'), 'images/main.jpg');
})();

/* ---------- 연락하기 바텀시트 ---------- */
(function contact() {

/* ---------- 달력 · 카운트다운 ---------- */
(function calendar() {
  const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
                  'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  const y = D.getFullYear(), m = D.getMonth();
  $('calKoDate').textContent = y + '년 ' + (m + 1) + '월 ' + D.getDate() + '일';
  $('calMonth').textContent = MONTHS[m];

  const grid = $('calGrid');
  ['일','월','화','수','목','금','토'].forEach((w, i) => {
    const c = document.createElement('div');
    c.className = 'dow' + (i === 0 ? ' sun' : i === 6 ? ' sat' : '');
    c.textContent = w;
    grid.append(c);
  });
  const first = new Date(y, m, 1).getDay();
  const last = new Date(y, m + 1, 0).getDate();
  for (let i = 0; i < first; i++) grid.append(document.createElement('div'));
  for (let d = 1; d <= last; d++) {
    const col = (first + d - 1) % 7;
    const c = document.createElement('div');
    c.className = 'day' + (col === 0 ? ' sun' : col === 6 ? ' sat' : '');
    if (d === D.getDate()) {
      c.classList.add('wd');
      const s = document.createElement('span');
      s.textContent = d;
      c.append(s);
    } else {
      c.textContent = d;
    }
    grid.append(c);
  }

  const line = $('ddayLine');
  const today0 = new Date(); today0.setHours(0, 0, 0, 0);
  const day0 = new Date(D); day0.setHours(0, 0, 0, 0);
  const dd = Math.round((day0 - today0) / 864e5);
  const names = CONFIG.groom.name + ' <span class="hrt">♥</span> ' + CONFIG.bride.name;
  if (dd > 0)       line.innerHTML = names + '의 결혼식이 <b>' + dd + '</b>일 남았습니다.';
  else if (dd === 0) line.innerHTML = '오늘, ' + names + ' 결혼합니다.';
  else               line.innerHTML = '저희의 시작을 축복해 주셔서 감사합니다.';

  const tick = () => {
    let diff = D - new Date();
    if (diff < 0) diff = 0;
    $('cdD').textContent = Math.floor(diff / 864e5);
    $('cdH').textContent = p2(Math.floor(diff / 36e5) % 24);
    $('cdM').textContent = p2(Math.floor(diff / 6e4) % 60);
    $('cdS').textContent = p2(Math.floor(diff / 1e3) % 60);
  };
  tick();
  setInterval(tick, 1000);
})();

/* ---------- 갤러리 · 라이트박스 ---------- */
(function gallery() {
  const grid = $('gGrid');
  const MAX_AUTO = 40;

  const addTile = img => {
    const btn = document.createElement('button');
    btn.className = 'g-item';
    btn.type = 'button';
    btn.append(img);
    btn.addEventListener('click', () => { if (img.naturalWidth) openLb(img); });
    grid.append(btn);
  };
  const addBlank = label => {
    const btn = document.createElement('button');
    btn.className = 'g-item';
    btn.type = 'button';
    btn.append(phNode(label));
    grid.append(btn);
  };

  if (CONFIG.galleryCount === 'auto') {
    /* gallery1.jpg부터 번호 순서대로, 없는 번호가 나오면 거기서 멈춤 */
    const probe = i => {
      if (i > MAX_AUTO) return;
      const img = new Image();
      img.src = 'images/gallery' + i + '.jpg';
      img.alt = '갤러리 사진 ' + i;
      img.onload = () => { addTile(img); probe(i + 1); };
      img.onerror = () => {
        if (i === 1) for (let k = 1; k <= 6; k++) addBlank('gallery' + k + '.jpg');
      };
    };
    probe(1);
  } else {
    for (let i = 1; i <= CONFIG.galleryCount; i++) {
      const img = new Image();
      img.src = 'images/gallery' + i + '.jpg';
      img.alt = '갤러리 사진 ' + i;
      addTile(img);
      initImg(img, 'gallery' + i + '.jpg');
    }
  }

  /* ── 사진 보기 (확대 없이 1배율 고정) ── */
  let imgs = [], cur = 0;
  const lb = $('lb'), lbImg = $('lbImg');

  const resetView = () => {
    lbImg.style.transition = 'none';
    lbImg.style.transform = 'none';
  };

  const show = () => {
    resetView();
    lbImg.src = imgs[cur].src;
    $('lbCnt').textContent = (cur + 1) + ' / ' + imgs.length;
  };

  function openLb(target) {
    imgs = [...document.querySelectorAll('.g-item img')].filter(i => i.naturalWidth);
    if (!imgs.length) return;
    cur = Math.max(0, imgs.indexOf(target));
    show();
    lb.classList.add('open');
    lock(true);
  }

  const closeLb = () => {
    lb.classList.remove('open');
    resetView();
    lock(false);
  };

  const move = dir => {
    cur = (cur + dir + imgs.length) % imgs.length;
    show();
  };

  $('lbX').addEventListener('click', closeLb);
  $('lbPrev').addEventListener('click', e => { e.stopPropagation(); move(-1); });
  $('lbNext').addEventListener('click', e => { e.stopPropagation(); move(1); });
  lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

  /* 터치: 확대 없이 좌우 넘기기만 지원 */
  let swipe = null;
  lb.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      swipe = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else {
      swipe = null;
    }
  }, { passive: true });

  lb.addEventListener('touchend', e => {
    if (!swipe || !e.changedTouches.length) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - swipe.x;
    const dy = t.clientY - swipe.y;
    swipe = null;
    if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy) * 1.2) {
      move(dx > 0 ? -1 : 1);
    }
  }, { passive: true });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') move(-1);
    if (e.key === 'ArrowRight') move(1);
  });

})();

/* ---------- 맺음 · 푸터 ---------- */
(function closing() {
  $('closing').textContent = CONFIG.closing;
  initImg($('closePhoto'), 'images/closing.jpg');
  if (CONFIG.rsvpUrl) {
    $('rsvpWrap').hidden = false;
    $('rsvpBtn').href = CONFIG.rsvpUrl;
  }
  $('footNames').innerHTML = '<span></span><span class="hrt">♥</span><span></span>';
  const sp = $('footNames').querySelectorAll('span');
  sp[0].textContent = CONFIG.groom.name;
  sp[2].textContent = CONFIG.bride.name;

  $('btnCopy').addEventListener('click', () => copyText(location.href, '청첩장 링크가 복사되었습니다'));
  $('btnShare').addEventListener('click', async () => {
    const data = {
      title: document.title,
      text: CONFIG.wedding.dateText + ' · ' + CONFIG.venue.name,
      url: location.href,
    };
    if (navigator.share) {
      try { await navigator.share(data); } catch (e) {}
    } else {
      copyText(location.href, '링크가 복사되었습니다. 붙여넣기로 공유해 주세요');
    }
  });
})();

/* ---------- 사진·화면 보호 (확대·저장 방지) ----------
   해제하고 싶으면 이 블록 전체를 지우고, 파일 맨 위 viewport의
   maximum-scale=1.0, user-scalable=no 부분을 삭제하세요.        */
(function protect() {
  // 우클릭 · 안드로이드 길게 눌러 저장 메뉴 차단
  document.addEventListener('contextmenu', e => e.preventDefault());
  // 이미지를 드래그해서 끌어가기 차단
  document.addEventListener('dragstart', e => e.preventDefault());
  // iOS 사파리 핀치 줌 차단 (사파리는 viewport 설정을 무시하므로 별도 처리)
  ['gesturestart', 'gesturechange', 'gestureend'].forEach(ev =>
    document.addEventListener(ev, e => e.preventDefault())
  );
  // 두 손가락 확대 차단
  document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  // 더블탭 확대 차단
  let lastTouch = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouch < 300) e.preventDefault();
    lastTouch = now;
  }, { passive: false });
})();

/* ---------- 스크롤 등장 효과 ---------- */
(function fades() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('show');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.fade').forEach(el => io.observe(el));
})();
</script>
